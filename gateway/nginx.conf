worker_processes 1;

events { worker_connections 1024; }

http {
    sendfile on;

    upstream frontend { server frontend:80; }
    upstream api_service { server api-service:8000; }
    upstream auth_service { server auth-service:8001; }
    upstream market_service { server market-service:8002; }
    upstream ml_service { server ml-service:8003; }
    upstream forecast_service { server forecast-service:8004; }
    upstream trading_service { server trading-service:8005; }

    server {
        listen 80;

        # Frontend Route
        location / {
            proxy_pass http://frontend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Core API Hub Routes
        location /analyze/ {
            proxy_pass http://api_service;
        }

        location /radar/ {
            proxy_pass http://api_service;
        }

        location /journal/ {
            proxy_pass http://api_service;
        }

        # Auth Routes
        location /auth/ {
            proxy_pass http://auth_service;
        }

        # Market Data Routes
        location /market/ {
            proxy_pass http://market_service;
        }

        # ML Inference Routes
        location /predict/ {
            proxy_pass http://ml_service;
        }

        # Forecasting Routes
        location /forecast/ {
            proxy_pass http://forecast_service;
        }

        # Trading & Orchestration Routes
        location /trading/ {
            proxy_pass http://trading_service;
        }

        # Healthcheck
        location /health {
            proxy_pass http://api_service/health;
        }
    }
}
