apiVersion: apps/v1
kind: Deployment
metadata:
  name: market-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: market-service
  template:
    metadata:
      labels:
        app: market-service
    spec:
      containers:
        - name: market-service
          image: quant-market-service:latest
          ports:
            - containerPort: 8002
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: market-service
spec:
  selector:
    app: market-service
  ports:
    - protocol: TCP
      port: 8002
      targetPort: 8002
